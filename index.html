<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 32' fill='none'%3E%3Cpath d='M6 2H16L20 9H2Z' fill='%235ba4d9'/%3E%3Cpath d='M8 3.5H14L16.5 8H5.5Z' fill='%236cb8e8' opacity='0.25'/%3E%3Cpath d='M2 9L11 31V9Z' fill='%231e5a82'/%3E%3Cpath d='M20 9L11 31V9Z' fill='%233d88b8'/%3E%3Cline x1='1.5' y1='9' x2='20.5' y2='9' stroke='%236cb8e8' stroke-width='0.5' opacity='0.5'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200..700&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300..700&display=swap"
      rel="stylesheet"
    />
    <title>Facet</title>
    <script>
      // ⚠️ Keep in sync with src/store/uiStore.ts persist key and state shape
      try {
        const stored = JSON.parse(localStorage.getItem('vector-resume-ui') || '{}');
        const appearance = stored?.state?.appearance || 'system';
        const theme = appearance === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : appearance;
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        console.warn('Theme init failed:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
